# GSP Recruitment — Docker Compose
# Caddy-compatible versie (alleen 127.0.0.1 binding, geen nginx)

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: gsp-postgres
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
    env_file:
      - ./talent-os/.env
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U talentos_admin -d recruitment_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gsp-net

  # ── FastAPI Backend ────────────────────────────────────────────────────
  backend:
    build:
      context: ./talent-os/backend
      dockerfile: ../Dockerfile
    container_name: gsp-backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
    env_file:
      - ./talent-os/.env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - gsp-net

networks:
  gsp-net:
    driver: bridge

volumes:
  pgdata: