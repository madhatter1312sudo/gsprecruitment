# Talent OS — Nginx Reverse Proxy
# TLS termination, rate limiting, security headers.
# Bind FastAPI to 127.0.0.1 only — Nginx is the public gateway.

upstream backend {
    server 127.0.0.1:8000;
}

# HTTP → HTTPS redirect (optional, uncomment after setting up certbot)
# server {
#     listen 80;
#     server_name talentos.yourdomain.com;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # ── Security Headers ─────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Rate Limiting ────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req zone=api burst=20 nodelay;

    # ── API Proxy ────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS headers for the dashboard
        add_header Access-Control-Allow-Origin "http://localhost:3000" always;
        add_header Access-Control-Allow-Origin "https://gsprecruitment.nl" always;
        add_header Access-Control-Allow-Origin "https://www.gsprecruitment.nl" always;
        add_header Access-Control-Allow-Methods "GET, POST, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "X-API-Key, X-Hermes-Signature, Content-Type" always;
        add_header Access-Control-Allow-Credentials "true" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ── Health Check ─────────────────────────────────────────────────
    location /health {
        proxy_pass http://backend/health;
        proxy_set_header Host $host;
    }

    # ── Next.js Dashboard (future) ───────────────────────────────────
    # location / {
    #     proxy_pass http://frontend:3000;
    #     proxy_set_header Host $host;
    # }

    # ── Deny all other paths ─────────────────────────────────────────
    location / {
        return 404;
    }
}

